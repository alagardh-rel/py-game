<!DOCTYPE html>
<html lang="en">
<head>
    <!-- 
    Word Search Game - Game Page
    ============================
    This is the main game interface where players search for words.
    
    Purpose:
    - Displays the 30x30 letter grid
    - Handles word input and validation
    - Manages countdown timer (60 seconds)
    - Shows current score and found words
    - Handles game end and score submission
    -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Search Game - Play</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container game-container">
        <!-- Header with Timer and Score -->
        <header class="game-header">
            <h1>🔍 Word Search Game</h1>
            <div class="game-info">
                <div class="info-box">
                    <span class="label">Player:</span>
                    <span id="playerNameDisplay">Loading...</span>
                </div>
                <div class="info-box">
                    <span class="label">Time:</span>
                    <span id="timer" class="timer">60</span>s
                </div>
                <div class="info-box">
                    <span class="label">Score:</span>
                    <span id="score" class="score">0</span>
                </div>
            </div>
        </header>

        <!-- Main Game Area -->
        <main class="game-main">
            <!-- Left: Word Search Grid -->
            <section class="game-grid-section">
                <h2>Find Words in the Grid</h2>
                <div id="wordGrid" class="word-grid">
                    <!-- Grid will be generated by JavaScript -->
                </div>
            </section>

            <!-- Right: Control Panel -->
            <section class="game-controls-section">
                <!-- Input Section -->
                <div class="card input-card">
                    <h3>Word Search</h3>
                    <input 
                        type="text" 
                        id="wordInput" 
                        placeholder="Type a word..." 
                        maxlength="30"
                        autocomplete="off"
                    >
                    <button id="submitBtn" class="btn btn-primary">Submit Word</button>
                </div>

                <!-- Found Words List -->
                <div class="card words-card">
                    <h3>Words Found (<span id="wordCount">0</span>)</h3>
                    <ul id="foundWordsList" class="found-words-list">
                        <li class="placeholder">No words found yet...</li>
                    </ul>
                </div>

                <!-- Messages -->
                <div id="messageBox" class="card message-card">
                    <p id="message" class="message">Ready to play!</p>
                </div>

                <!-- End Game Button -->
                <button id="endGameBtn" class="btn btn-danger">End Game</button>
            </section>
        </main>

        <!-- Game Over Modal -->
        <div id="gameOverModal" class="modal hidden">
            <div class="modal-content">
                <h2>Game Over!</h2>
                <div class="score-summary">
                    <p>Player: <strong id="finalPlayerName"></strong></p>
                    <p>Final Score: <strong id="finalScore"></strong></p>
                    <p>Words Found: <strong id="finalWordCount"></strong></p>
                </div>
                <div class="button-group">
                    <button id="submitScoreBtn" class="btn btn-primary">Submit Score</button>
                    <button id="playAgainBtn" class="btn btn-secondary">Play Again</button>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 Word Search Game</p>
        </footer>
    </div>

    <!-- Main Game Script -->
    <script>
        /**
         * ============================
         * GAME STATE VARIABLES
         * ============================
         * These variables track the current state of the game
         */
        // Get player name from template variable (passed from Flask backend)
        const templatePlayerName = "{{ player_name | escape }}";
        
        let gameState = {
            playerName: templatePlayerName,
            grid: [],
            foundWords: new Set(),
            score: 0,
            timeRemaining: 60,
            gameActive: true,
            timerInterval: null
        };

        /**
         * ============================
         * INITIALIZATION
         * ============================
         */

        // Initialize game on page load
        document.addEventListener('DOMContentLoaded', function() {
            // Validate that we have a player name (means Flask session is valid)
            if (!gameState.playerName || gameState.playerName === 'None') {
                alert('No active game session. Redirecting to home...');
                window.location.href = '/';
                return;
            }

            // Display player name
            document.getElementById('playerNameDisplay').textContent = escapeHtml(gameState.playerName);

            // Load game grid from server
            loadGameGrid();

            // Setup event listeners
            setupEventListeners();

            // Start countdown timer
            startTimer();
        });

        /**
         * Load the game grid from the backend
         * The backend already generated the grid when start-game was called
         */
        async function loadGameGrid() {
            try {
                // In this version, we'll generate a grid on the client side
                // For production, this could be fetched from backend
                generateRandomGrid();
                displayGrid();
            } catch (error) {
                console.error('Error loading grid:', error);
                alert('Failed to load game grid');
            }
        }

        /**
         * Generate a random grid (client-side for demo)
         * In production, this would come from the server
         */
        function generateRandomGrid(size = 30) {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            gameState.grid = [];
            for (let i = 0; i < size; i++) {
                let row = [];
                for (let j = 0; j < size; j++) {
                    row.push(letters.charAt(Math.floor(Math.random() * letters.length)));
                }
                gameState.grid.push(row);
            }
        }

        /**
         * Display the word search grid in HTML
         */
        function displayGrid() {
            const gridContainer = document.getElementById('wordGrid');
            gridContainer.innerHTML = '';

            gameState.grid.forEach((row, rowIndex) => {
                const rowDiv = document.createElement('div');
                rowDiv.className = 'grid-row';

                row.forEach((letter, colIndex) => {
                    const cellDiv = document.createElement('div');
                    cellDiv.className = 'grid-cell';
                    cellDiv.textContent = letter;
                    cellDiv.dataset.row = rowIndex;
                    cellDiv.dataset.col = colIndex;
                    rowDiv.appendChild(cellDiv);
                });

                gridContainer.appendChild(rowDiv);
            });
        }

        /**
         * Setup all event listeners for the game
         */
        function setupEventListeners() {
            // Submit word button
            document.getElementById('submitBtn').addEventListener('click', submitWord);

            // Enter key in word input
            document.getElementById('wordInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    submitWord();
                }
            });

            // End game button
            document.getElementById('endGameBtn').addEventListener('click', endGame);

            // Modal buttons
            document.getElementById('submitScoreBtn').addEventListener('click', submitScore);
            document.getElementById('playAgainBtn').addEventListener('click', playAgain);
        }

        /**
         * Submit a word to the backend for validation
         */
        async function submitWord() {
            if (!gameState.gameActive) {
                return;
            }

            const wordInput = document.getElementById('wordInput');
            const word = wordInput.value.trim().toUpperCase();

            // Validation
            if (!word) {
                showMessage('Please enter a word', 'error');
                return;
            }

            if (word.length < 3) {
                showMessage('Word must be at least 3 letters', 'error');
                return;
            }

            if (gameState.foundWords.has(word)) {
                showMessage('Already found that word!', 'warning');
                wordInput.value = '';
                return;
            }

            try {
                // Send word to backend for validation
                // Flask session contains the game_id and player_name
                const response = await fetch('/api/submit-word', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        word: word
                    })
                });

                const data = await response.json();

                if (data.valid) {
                    // Word is valid!
                    gameState.foundWords.add(word);
                    gameState.score = data.score;

                    // Update UI
                    addFoundWord(word, data.points);
                    updateScore();
                    showMessage(data.message, 'success');
                } else {
                    // Word not valid
                    showMessage(data.message, 'error');
                }

                // Clear input
                wordInput.value = '';
                wordInput.focus();
            } catch (error) {
                console.error('Error submitting word:', error);
                showMessage('Error checking word. Try again.', 'error');
            }
        }

        /**
         * Add a found word to the display list
         */
        function addFoundWord(word, points) {
            const list = document.getElementById('foundWordsList');

            // Remove placeholder if this is the first word
            if (gameState.foundWords.size === 1) {
                list.innerHTML = '';
            }

            const li = document.createElement('li');
            li.className = 'found-word-item';
            li.innerHTML = `<span class="word">${escapeHtml(word)}</span><span class="points">+${points}</span>`;
            list.appendChild(li);
        }

        /**
         * Update the score display
         */
        function updateScore() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('wordCount').textContent = gameState.foundWords.size;
        }

        /**
         * Display a message to the user
         */
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = `message message-${type}`;

            // Auto-clear after 3 seconds
            setTimeout(() => {
                messageEl.textContent = 'Ready to search...';
                messageEl.className = 'message';
            }, 3000);
        }

        /**
         * ============================
         * TIMER FUNCTIONS
         * ============================
         */

        function startTimer() {
            gameState.timerInterval = setInterval(() => {
                gameState.timeRemaining--;
                document.getElementById('timer').textContent = gameState.timeRemaining;

                // Update timer color as time runs out
                const timer = document.getElementById('timer');
                if (gameState.timeRemaining <= 10) {
                    timer.classList.add('warning');
                }

                if (gameState.timeRemaining <= 0) {
                    endGameAutomatically();
                }
            }, 1000);
        }

        function endGameAutomatically() {
            gameState.gameActive = false;
            clearInterval(gameState.timerInterval);
            showGameOverModal();
        }

        /**
         * ============================
         * GAME END FUNCTIONS
         * ============================
         */

        function endGame() {
            if (confirm('Are you sure you want to end the game?')) {
                endGameAutomatically();
            }
        }

        function showGameOverModal() {
            document.getElementById('finalPlayerName').textContent = escapeHtml(gameState.playerName);
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('finalWordCount').textContent = gameState.foundWords.size;
            document.getElementById('gameOverModal').classList.remove('hidden');
        }

        async function submitScore() {
            try {
                const response = await fetch('/api/end-game', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({})
                });

                const data = await response.json();

                if (data.success) {
                    alert(`Great job, ${escapeHtml(data.player_name)}! Your score of ${data.score} has been submitted.`);
                    window.location.href = '/';
                } else {
                    alert('Error submitting score. Please try again.');
                }
            } catch (error) {
                console.error('Error submitting score:', error);
                alert('Failed to submit score');
            }
        }

        function playAgain() {
            window.location.href = '/';
        }

        /**
         * ============================
         * UTILITY FUNCTIONS
         * ============================
         */

        /**
         * Escape HTML special characters to prevent XSS attacks
         */
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }
    </script>
</body>
</html>
